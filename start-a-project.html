<style>
@font-face {
  font-family: 'CasualHandwriting';
  src: url('CasualHandwriting.woff2') format('woff2'), url('CasualHandwriting.woff') format('woff');
  font-weight: normal;
  font-style: normal;
  font-display: block;
}
:root {
  --ink:#132447;
  --paper:#ffffff;
  --yellow:#fcd346;
  --stone:#D8D1C3;
  --slate:#596674;
  --brass:#e6b800;
  --clay:#B86B4B;
  --paper-mid:#F5EFE0;
  --navy:#132447;
  --f-accent:'CasualHandwriting', cursive;
  --f-head:'Montserrat', sans-serif;
  --f-body:'Montserrat', sans-serif;
  --max:1120px;
  --gutter:clamp(24px,5vw,80px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:var(--f-body);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;max-width:100%;height:auto;}
a{color:inherit;text-decoration:none;}
ul{list-style:none;}
button,input,textarea,select{font:inherit;}
button{color:inherit;}
.container{max-width:var(--max);margin:0 auto;padding:0 var(--gutter);}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--navy);transition:box-shadow .3s;}
.nav::after{content:"";position:absolute;top:100%;left:0;right:0;height:4px;background:var(--navy);}
.nav.scrolled{box-shadow:0 2px 24px rgba(19,36,71,.5);}
.nav-inner{max-width:var(--max);margin:0 auto;padding:0 var(--gutter);height:72px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.nav-logo img{height:52px;width:auto;display:block;}
.nav-links{display:flex;align-items:center;gap:24px;flex-wrap:nowrap;}
.nav-links a{font-size:12px;font-weight:500;color:rgba(255,252,244,.75);letter-spacing:.03em;transition:color .2s;white-space:nowrap;}
.nav-links a:hover,.nav-links a.active{color:var(--paper);}
.nav-links a.active{font-weight:600;}
.nav-cta{background:var(--yellow)!important;color:var(--navy)!important;padding:10px 20px;font-size:12px!important;font-weight:700!important;letter-spacing:.03em!important;}
.nav-cta:hover{background:var(--brass)!important;}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:0;}
.nav-toggle span{display:block;width:24px;height:2px;background:var(--paper);}

/* HERO */
.page-header{padding:clamp(66px,9vw,108px) 0 clamp(44px,6vw,72px);margin-top:72px;border-bottom:1px solid var(--stone);background:linear-gradient(180deg,#fff 0%,#fbfaf7 100%);}
.page-header-inner{max-width:780px;}
.eyebrow-label{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.eyebrow-tag{font-size:11px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--yellow);background:var(--navy);padding:6px 14px;flex-shrink:0;}
.eyebrow-desc{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--slate);}
.page-header h1{font-family:var(--f-head);font-size:clamp(32px,4.7vw,54px);font-weight:400;color:var(--ink);letter-spacing:-.02em;line-height:1.08;}
.accent-line{display:block;font-family:var(--f-accent);font-size:clamp(31px,4.3vw,54px);font-weight:normal;color:var(--slate);line-height:1.15;margin-top:8px;letter-spacing:0;}
.page-intro{font-size:clamp(16px,1.9vw,18px);line-height:1.85;color:var(--ink);max-width:690px;margin-top:26px;}
.hero-note{display:flex;align-items:center;gap:10px;margin-top:22px;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--slate);}
.hero-note-dot{width:7px;height:7px;background:var(--yellow);border-radius:50%;flex-shrink:0;}

/* FORM LAYOUT */
.form-section{padding:clamp(48px,7vw,92px) 0;background:var(--paper);}
.form-layout{display:grid;grid-template-columns:minmax(230px,.7fr) minmax(0,1.55fr);gap:clamp(32px,5vw,76px);align-items:start;}
.form-aside{position:sticky;top:112px;}
.aside-kicker{display:flex;align-items:center;gap:9px;font-size:9px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--slate);margin-bottom:12px;}
.aside-kicker::before{content:"";width:22px;height:3px;background:var(--yellow);flex-shrink:0;}
.aside-heading{font-family:var(--f-head);font-size:clamp(21px,2.4vw,29px);font-weight:500;line-height:1.25;letter-spacing:-.015em;margin-bottom:16px;}
.aside-copy{font-size:14px;line-height:1.85;color:var(--slate);margin-bottom:26px;}
.next-list{border-top:1px solid var(--stone);}
.next-item{display:grid;grid-template-columns:30px 1fr;gap:12px;padding:18px 0;border-bottom:1px solid var(--stone);}
.next-num{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--clay);padding-top:2px;}
.next-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);margin-bottom:4px;}
.next-copy{font-size:12px;line-height:1.65;color:var(--slate);}
.price-link{display:inline-flex;align-items:center;gap:8px;margin-top:22px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);border-bottom:2px solid var(--yellow);padding-bottom:2px;}

.form-shell{border:1px solid var(--stone);background:var(--paper);box-shadow:0 18px 50px rgba(19,36,71,.06);}
.form-progress{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--stone);background:#fbfaf7;}
.progress-step{position:relative;padding:17px 12px 15px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#96999f;border-right:1px solid var(--stone);}
.progress-step:last-child{border-right:0;}
.progress-step::after{content:"";position:absolute;left:0;right:100%;bottom:-1px;height:3px;background:var(--yellow);transition:right .28s ease;}
.progress-step.active{color:var(--ink);}
.progress-step.complete{color:var(--slate);}
.progress-step.active::after,.progress-step.complete::after{right:0;}
.form-body{padding:clamp(28px,4.5vw,54px);}
.form-step{display:none;animation:fadeIn .25s ease;}
.form-step.active{display:block;}
@keyframes fadeIn{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}
.step-kicker{display:flex;align-items:center;gap:9px;font-size:9px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--slate);margin-bottom:9px;}
.step-kicker::before{content:"";width:22px;height:3px;background:var(--yellow);flex-shrink:0;}
.step-title{font-family:var(--f-head);font-size:clamp(22px,2.8vw,31px);font-weight:500;letter-spacing:-.015em;line-height:1.25;margin-bottom:10px;}
.step-intro{font-size:14px;line-height:1.8;color:var(--slate);max-width:620px;margin-bottom:30px;}
.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;}
.field{margin-bottom:22px;}
.field-grid .field{margin-bottom:0;}
.field.full{grid-column:1/-1;}
label,.field-label{display:block;font-size:12px;font-weight:700;letter-spacing:.025em;color:var(--ink);margin-bottom:8px;}
.optional,.required-note{display:inline-block;margin-left:5px;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);}
.required-note{color:var(--clay);}
.help-text{display:block;font-size:11px;line-height:1.6;color:var(--slate);margin-top:7px;}
.text-input,.text-area,.select-input{width:100%;border:1px solid var(--stone);background:#fff;color:var(--ink);padding:14px 15px;border-radius:0;outline:none;transition:border-color .2s,box-shadow .2s;}
.text-input,.select-input{min-height:50px;}
.text-area{min-height:132px;resize:vertical;line-height:1.65;}
.text-input:focus,.text-area:focus,.select-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(252,211,70,.34);}
.text-input::placeholder,.text-area::placeholder{color:#9b9da1;}
fieldset{border:0;min-width:0;}
legend{width:100%;}
.question-block{margin-bottom:32px;}
.question-block:last-child{margin-bottom:0;}
.question-title{font-size:13px;font-weight:700;line-height:1.45;color:var(--ink);margin-bottom:7px;}
.question-help{font-size:12px;line-height:1.65;color:var(--slate);margin-bottom:14px;}

/* CHOICE CARDS */
.choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;grid-auto-rows:1fr;}
.call-grid{grid-template-columns:repeat(3,minmax(0,1fr));}
.package-grid{grid-auto-rows:1fr;}
.package-grid .choice-card{height:100%;}
.package-grid .choice-content{min-height:142px;}
.choice-card{position:relative;display:block;cursor:pointer;}
.choice-card.wide{grid-column:auto;}
.choice-card input{position:absolute;opacity:0;pointer-events:none;}
.choice-content{display:block;height:100%;border:1px solid var(--stone);padding:17px 18px;background:#fff;transition:border-color .2s,background .2s,transform .2s,box-shadow .2s;}
.choice-card:hover .choice-content{border-color:#a9a394;transform:translateY(-1px);}
.choice-card input:focus-visible + .choice-content{outline:3px solid rgba(252,211,70,.55);outline-offset:2px;}
.choice-card input:checked + .choice-content{border-color:var(--navy);background:#fbfaf6;box-shadow:inset 4px 0 0 var(--yellow);}
.choice-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:6px;}
.choice-name{font-size:12px;font-weight:700;color:var(--ink);line-height:1.45;}
.choice-price{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--clay);white-space:nowrap;}
.choice-desc{display:block;font-size:11px;line-height:1.65;color:var(--slate);}

/* CHECK OPTIONS */
.check-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;grid-auto-rows:1fr;}
.check-option{position:relative;display:block;cursor:pointer;height:100%;}
.check-option input{position:absolute;opacity:0;pointer-events:none;}
.check-box{display:flex;align-items:flex-start;gap:11px;height:100%;min-height:64px;border:1px solid var(--stone);padding:13px 14px;background:#fff;font-size:12px;line-height:1.5;color:var(--slate);transition:border-color .2s,background .2s;}
.check-mark{width:16px;height:16px;border:1px solid #aaa69d;flex:0 0 16px;margin-top:1px;position:relative;background:#fff;}
.check-option input:checked + .check-box{border-color:var(--navy);background:#fbfaf6;color:var(--ink);}
.check-option input:checked + .check-box .check-mark{background:var(--navy);border-color:var(--navy);}
.check-option input:checked + .check-box .check-mark::after{content:"";position:absolute;width:4px;height:8px;border:solid var(--yellow);border-width:0 2px 2px 0;transform:rotate(45deg);left:5px;top:2px;}
.check-option input:focus-visible + .check-box{outline:3px solid rgba(252,211,70,.55);outline-offset:2px;}

.price-note{background:var(--paper-mid);border-left:4px solid var(--yellow);padding:16px 18px;margin:24px 0 4px;}
.price-note p{font-size:12px;line-height:1.7;color:var(--slate);}
.price-note strong{color:var(--ink);}
.error-message{display:none;color:#9f3d25;font-size:11px;font-weight:600;margin-top:9px;}
.error-message.show{display:block;}
.invalid .text-input,.invalid .text-area,.invalid .select-input{border-color:#b85d43;}
.invalid .choice-content,.invalid .check-box{border-color:#b85d43;}

.form-actions{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:34px;padding-top:24px;border-top:1px solid var(--stone);}
.form-actions .btn{width:205px;min-width:205px;}
.btn{appearance:none;border:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-width:150px;min-height:48px;padding:13px 24px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:background .2s,color .2s,border-color .2s,transform .2s;}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:#1b315e;}
.btn-yellow{background:var(--yellow);color:var(--navy);padding-left:29px;padding-right:29px;}
.btn-yellow:hover{background:var(--brass);}
.btn-back{background:transparent;color:var(--slate);border:1px solid var(--stone);}
.btn-back:hover{border-color:var(--slate);color:var(--ink);}
.step-count{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--slate);text-transform:uppercase;}
.privacy-note{font-size:10px;line-height:1.65;color:var(--slate);margin-top:16px;}
.privacy-note a{text-decoration:underline;text-underline-offset:3px;}

/* SUCCESS */
.success-panel{display:none;padding:clamp(40px,5vw,64px);text-align:center;}
.success-panel.show{display:block;}
.success-mark{width:54px;height:54px;background:var(--yellow);border-radius:50%;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:700;color:var(--navy);}
.success-title{font-family:var(--f-head);font-size:clamp(24px,3vw,34px);font-weight:500;margin-bottom:12px;}
.success-copy{font-size:14px;line-height:1.8;color:var(--slate);max-width:550px;margin:0 auto;}

/* FOOTER */
.footer{background:var(--paper);padding:48px 0 32px;border-top:1px solid var(--stone);}
.footer-inner{max-width:var(--max);margin:0 auto;padding:0 var(--gutter);text-align:center;}
.footer-logo-wrap{margin-bottom:16px;}
.footer-logo-wrap img{width:96px;height:96px;margin:0 auto;}
.footer-tagline{font-size:13px;color:var(--slate);max-width:320px;margin:0 auto 28px;line-height:1.7;}
.footer-divider{border:0;border-top:1px solid var(--stone);margin:0 0 24px;}
.footer-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 28px;margin-bottom:28px;}
.footer-nav a{font-size:13px;color:var(--slate);transition:color .2s;}
.footer-nav a:hover{color:var(--ink);}
.footer-bottom{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.footer-copy{font-size:11px;color:var(--slate);letter-spacing:.05em;}
.footer-dot-sm{width:6px;height:6px;background:var(--yellow);border-radius:50%;flex-shrink:0;}
.footer-legal-links{display:flex;justify-content:center;gap:20px;margin-top:16px;}
.footer-legal-links a{font-size:11px;color:var(--slate);letter-spacing:.05em;text-decoration:underline;text-underline-offset:3px;transition:color .2s;}
.footer-legal-links a:hover{color:var(--ink);}

/* HONEYPOT */
.website-field{position:absolute!important;left:-9999px!important;width:1px!important;height:1px!important;overflow:hidden!important;}

@media(max-width:900px){
  .form-layout{grid-template-columns:1fr;}
  .form-aside{position:static;display:grid;grid-template-columns:1fr 1fr;gap:26px;}
  .aside-copy{margin-bottom:0;}
  .price-link{margin-top:16px;}
}
@media(max-width:760px){
  .call-grid{grid-template-columns:1fr;}
}
@media(max-width:640px){
  .nav-links{display:none;}
  .nav-links.open{display:flex;flex-direction:column;position:fixed;top:72px;left:0;right:0;background:var(--navy);padding:24px clamp(24px,5vw,80px) 32px;gap:20px;z-index:99;}
  .nav-toggle{display:flex;}
  .eyebrow-label{flex-direction:column;align-items:flex-start;gap:8px;}
  .form-aside{grid-template-columns:1fr;}
  .form-progress{grid-template-columns:repeat(4,1fr);}
  .progress-step{font-size:0;padding:16px 7px;}
  .progress-step::before{font-size:9px;content:attr(data-short);}
  .field-grid,.choice-grid,.check-grid{grid-template-columns:1fr;}
  .choice-card.wide{grid-column:auto;}
  .package-grid .choice-content{min-height:0;}
  .check-box{min-height:0;}
  .form-actions{flex-wrap:wrap;}
  .step-count{width:100%;order:-1;}
  .btn{flex:1;}
  .form-actions .btn{width:auto;min-width:0;}
  .footer-bottom{flex-direction:column;text-align:center;}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{scroll-behavior:auto!important;animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
}


/* REFINED SINGLE-SCROLL PROJECT FORM */
.form-section{
  background:var(--paper);
  padding:clamp(42px,6vw,78px) 0 clamp(64px,8vw,104px);
}
.form-layout{
  display:block;
  max-width:980px;
  margin:0 auto;
}
.form-aside{
  position:relative;
  top:auto;
  display:block;
  overflow:hidden;
  margin:0 0 24px;
  padding:clamp(30px,4.5vw,50px);
  background:var(--navy);
  color:var(--paper);
  border-left:6px solid var(--yellow);
  box-shadow:0 20px 54px rgba(19,36,71,.14);
}
.form-aside::after{
  content:"";
  position:absolute;
  width:240px;
  height:240px;
  right:-115px;
  top:-150px;
  border:1px solid rgba(252,211,70,.2);
  border-radius:50%;
  box-shadow:0 0 0 34px rgba(252,211,70,.035),0 0 0 68px rgba(252,211,70,.025);
  pointer-events:none;
}
.form-aside > *{position:relative;z-index:1;}
.aside-kicker{color:rgba(255,255,255,.68);margin-bottom:14px;}
.aside-kicker::before{background:var(--yellow);}
.aside-heading{
  color:var(--paper);
  max-width:720px;
  font-size:clamp(25px,3.4vw,38px);
  font-weight:400;
  line-height:1.18;
  margin-bottom:16px;
}
.aside-copy{
  max-width:760px;
  color:rgba(255,255,255,.72);
  font-size:15px;
  line-height:1.85;
  margin-bottom:20px;
}
.price-link{color:var(--paper);border-color:var(--yellow);margin-top:0;}
.price-link:hover{color:var(--yellow);}
.next-list{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  margin-top:34px;
  border-top:1px solid rgba(255,255,255,.16);
}
.next-item{
  display:block;
  padding:20px 18px 0;
  border:0;
  border-right:1px solid rgba(255,255,255,.13);
}
.next-item:first-child{padding-left:0;}
.next-item:last-child{padding-right:0;border-right:0;}
.next-num{display:block;color:var(--yellow);padding:0;margin-bottom:8px;}
.next-title{color:var(--paper);font-size:11px;line-height:1.45;margin-bottom:6px;}
.next-copy{color:rgba(255,255,255,.62);font-size:11px;line-height:1.65;}

.form-shell{
  overflow:hidden;
  border:1px solid #cfc6b7;
  background:var(--paper);
  box-shadow:0 24px 70px rgba(19,36,71,.11);
}
.form-progress{
  background:var(--navy);
  border-bottom:0;
}
.progress-step{
  color:rgba(255,255,255,.43);
  border-right:1px solid rgba(255,255,255,.13);
  padding:19px 12px 17px;
}
.progress-step.active{color:var(--paper);}
.progress-step.complete{color:rgba(255,255,255,.7);}
.progress-step::after{bottom:0;height:4px;}
.form-body{padding:clamp(32px,5.5vw,62px);}
.step-kicker{color:var(
